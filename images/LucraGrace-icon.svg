<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background Circle with Shadow -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b56"/>
      <stop offset="100%" stop-color="#0a1a80"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD800"/>
      <stop offset="100%" stop-color="#ffd633"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Rounded Bars (Profit Growth) -->
  <rect x="25" y="60" width="12" height="20" rx="6" ry="6" fill="white"/>
  <rect x="42" y="50" width="12" height="30" rx="6" ry="6" fill="white"/>
  <rect x="59" y="35" width="12" height="45" rx="6" ry="6" fill="white"/>

  <!-- Insight Dot (Top) -->
  <circle cx="65" cy="28" r="6" fill="url(#dotGrad)" filter="url(#shadow)"/>
</svg>